<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Google Advanced Search</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="position-absolute top-0 end-0 p-3">
            <a href="index.html" class="text-dark text-decoration-none">Web Search</a>
        </div>
        <h3 class="ms-2 p-3">
            <span style="color: #4285F4;">G</span><span style="color: #EA4335;">o</span><span style="color: #FBBC05;">o</span><span style="color: #4285F4;">g</span><span style="color: #34A853;">l</span><span style="color: #EA4335;">e</span>
        </h3>
        <div style="margin-left: 40px;">
            <h5 style="color: rgba(240, 83, 10, 0.705)">Advanced Search</h5><hr style="border: 1px solid gray;">
            <h5>Find pages with...</h5>
            <form action="https://www.google.com/search" method="get">
                <table class="table table-borderless table-sm" style="width: 60%">
                    <tr>
                        <td class="small-column">all these words: </td>
                        <td><input type="text" name="as_q" class="big-column"></td>
                    </tr>
                    <tr>
                        <td class="small-column">this exact word or phrase: </td>
                        <td><input type="text" name="as_epq" class="big-column"></td>
                    </tr>
                    <tr>
                        <td class="small-column">any of these words: </td>
                        <td><input type="text" name="as_oq" class="big-column"></td>
                    </tr>
                    <tr>
                        <td class="small-column">none of these words: </td>
                        <td><input type="text" name="as_eq" class="big-column"></td>
                    </tr>
                        <td> </td>
                        <td style= "text-align: right;"><button class="btn btn-primary" type="submit">Advanced Search</button></td>
                    </tr>            
                </table>
            </form>
        </div>
    </body>
